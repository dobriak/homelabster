<div class="card"><div class="card-body"><h2 class="h5">Dashboard</h2>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}{% if saved %}<div class="alert alert-success">Settings saved. Refreshing the page…</div>{% endif %}
<form hx-post="/admin/settings" hx-target="#settings-form" hx-swap="innerHTML"><div class="row g-3"><div class="col-md-6"><label class="form-label" for="dashboard-title">Dashboard title</label><input class="form-control" id="dashboard-title" name="dashboard_title" required maxlength="120" value="{{ settings.dashboard_title if settings else '' }}"><div class="form-text">Displayed as the dashboard link in the top navigation and browser title.</div></div><div class="col-md-6"><label class="form-label" for="theme">Theme</label><select class="form-select" id="theme" name="theme"><option value="system" {% if settings and settings.theme == 'system' %}selected{% endif %}>Use system setting</option><option value="light" {% if settings and settings.theme == 'light' %}selected{% endif %}>Light</option><option value="dark" {% if settings and settings.theme == 'dark' %}selected{% endif %}>Dark</option></select></div><div class="col-md-6"><label class="form-label" for="health-interval">Health check interval (seconds)</label><input class="form-control" id="health-interval" name="health_check_interval_seconds" type="number" min="5" max="3600" required value="{{ settings.health_check_interval_seconds if settings else 30 }}"><div class="form-text">Checks run every 5–3,600 seconds.</div></div></div><div class="mt-3"><button class="btn btn-primary">Save settings</button></div></form></div></div>
