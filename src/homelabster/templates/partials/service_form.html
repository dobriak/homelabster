<div class="card"><div class="card-body"><h2 class="h5">{% if service %}Edit {{ service.name }}{% else %}Add service{% endif %}</h2>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form hx-{% if service %}put{% else %}post{% endif %}="{{ action }}" hx-encoding="multipart/form-data" hx-target="{% if service %}#service-{{ service.id }}{% else %}#service-rows{% endif %}" hx-swap="{% if service %}outerHTML{% else %}beforeend{% endif %}" enctype="multipart/form-data">
<div class="row g-3"><div class="col-md-6"><label class="form-label">Name</label><input class="form-control" id="service-name" required name="name" value="{{ service.name if service else '' }}" hx-get="/services/icon-preview" hx-trigger="input changed delay:500ms" hx-include="#service-icon-lookup" hx-target="#service-icon-preview" hx-swap="innerHTML"></div><div class="col-md-6"><label class="form-label">Stable ID <span class="text-body-secondary">(optional)</span></label><input class="form-control" name="service_id" pattern="[a-z0-9][a-z0-9-]*" value="{{ service.id if service else '' }}"></div><div class="col-md-6"><label class="form-label">Primary FQDN URL</label><input class="form-control" required type="url" name="primary_url" value="{{ service.primary_url if service else '' }}"></div><div class="col-md-6"><label class="form-label">IP:port fallback URL</label><input class="form-control" required type="url" name="fallback_url" value="{{ service.fallback_url if service else '' }}"></div><div class="col-md-6"><label class="form-label">Health URL <span class="text-body-secondary">(optional)</span></label><input class="form-control" type="url" name="health_url" value="{{ service.health_url if service and service.health_url else '' }}"></div><div class="col-md-6"><label class="form-label" for="service-category">Category</label><select class="form-select" id="service-category" name="category"><option value="" {% if not service or not service.category %}selected{% endif %}>Unassigned (All)</option>{% for category in categories if category.name != 'All' %}<option value="{{ category.name }}" {% if service and service.category == category.name %}selected{% endif %}>{{ category.name }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Icon preview</label><div id="service-icon-preview">{% include "partials/service_icon_preview.html" %}</div></div><div class="col-md-6"><label class="form-label" for="service-icon-lookup">Icon lookup name <span class="text-body-secondary">(optional)</span></label><input class="form-control" id="service-icon-lookup" name="icon_lookup_name" placeholder="Use a catalog name, such as Proxmox" hx-get="/services/icon-preview" hx-trigger="input changed delay:500ms" hx-include="#service-name" hx-target="#service-icon-preview" hx-swap="innerHTML"><div class="form-text">Overrides the service name only for automatic icon selection.</div></div><div class="col-md-6"><label class="form-label">Custom icon</label><input class="form-control" type="file" name="icon_upload" accept=".svg,.png,.webp"><div class="form-text">Upload one to replace the displayed icon.</div></div></div>
<div class="mt-3"><button class="btn btn-primary">Save service</button> <button type="button" class="btn btn-link" onclick="this.closest('#service-form-slot').innerHTML='<button class=\'btn btn-primary\' hx-get=\'/services/new\' hx-target=\'#service-form-slot\' hx-swap=\'innerHTML\'>Add service</button>'; htmx.process(this.closest('#service-form-slot'))">Cancel</button></div></form></div></div>
