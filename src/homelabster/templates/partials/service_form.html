<div class="card"><div class="card-body"><h2 class="h5">{% if service %}Edit {{ service.name }}{% else %}Add service{% endif %}</h2>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form hx-{% if service %}put{% else %}post{% endif %}="{{ action }}" hx-encoding="multipart/form-data" hx-target="{% if service %}#service-{{ service.id }}{% else %}#service-rows{% endif %}" hx-swap="{% if service %}outerHTML{% else %}beforeend{% endif %}" enctype="multipart/form-data">
<div class="row g-3"><div class="col-md-6"><label class="form-label">Name</label><input class="form-control" required name="name" value="{{ service.name if service else '' }}"></div><div class="col-md-6"><label class="form-label">Stable ID <span class="text-body-secondary">(optional)</span></label><input class="form-control" name="service_id" pattern="[a-z0-9][a-z0-9-]*" value="{{ service.id if service else '' }}"></div><div class="col-md-6"><label class="form-label">Primary FQDN URL</label><input class="form-control" required type="url" name="primary_url" value="{{ service.primary_url if service else '' }}"></div><div class="col-md-6"><label class="form-label">IP:port fallback URL</label><input class="form-control" required type="url" name="fallback_url" value="{{ service.fallback_url if service else '' }}"></div><div class="col-md-6"><label class="form-label">Health URL <span class="text-body-secondary">(optional)</span></label><input class="form-control" type="url" name="health_url" value="{{ service.health_url if service and service.health_url else '' }}"></div><div class="col-md-6"><label class="form-label">Custom icon</label><input class="form-control" type="file" name="icon_upload" accept=".svg,.png,.webp"><div class="form-text">Used if the icon catalog cannot identify the service.</div></div></div>
<div class="mt-3"><button class="btn btn-primary">Save service</button> <button type="button" class="btn btn-link" onclick="this.closest('#service-form-slot').innerHTML='<button class=\'btn btn-primary\' hx-get=\'/services/new\' hx-target=\'#service-form-slot\' hx-swap=\'innerHTML\'>Add service</button>'; htmx.process(this.closest('#service-form-slot'))">Cancel</button></div></form></div></div>
