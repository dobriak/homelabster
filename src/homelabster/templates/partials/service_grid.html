{% if services %}<div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xxl-4 g-3">
{% for service in services %}{% set health = monitor.statuses.get(service.id) %}{% set health_state = health.state if health else 'unknown' %}
  <div class="col"><article class="card h-100 shadow-sm"><div class="card-body"><div class="d-flex gap-3 align-items-center"><img class="service-icon" src="{% if service.icon.local_filename == 'default-service.svg' %}{{ url_for('static', path='default-service.svg') }}{% else %}/icons/{{ service.icon.local_filename }}{% endif %}" alt=""><div class="d-flex align-items-center gap-2"><h2 class="h5 mb-0"><a class="link-body-emphasis text-decoration-none" href="{{ service.primary_url }}" target="_blank" rel="noopener">{{ service.name }}</a></h2><a class="btn btn-sm btn-outline-secondary" href="{{ service.fallback_url }}" target="_blank" rel="noopener" aria-label="Open {{ service.name }} using its IP address">ip</a><span class="health-indicator health-{{ health_state }}" role="img" aria-label="Health status: {{ health_state }}"></span></div></div></div></article></div>
{% endfor %}</div>{% else %}<div class="alert alert-info">No services configured. <a href="/services">Add one in services</a>.</div>{% endif %}
