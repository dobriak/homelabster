{% extends "base.html" %}
{% block title %}{{ settings.dashboard_title }}{% endblock %}
{% block content %}
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<div id="service-grid" hx-get="/partials/services" hx-trigger="{% if settings.health_checks_enabled %}load, every {{ settings.health_check_interval_seconds }}s{% else %}load{% endif %}" hx-swap="innerHTML" hx-include="#service-search"><div class="text-body-secondary">Loading services…</div></div>
{% endblock %}
